{% extends "base.html" %}

{% block content %}

<h2>Top Learners</h2>

<table class="leaderboard">

<tr>
<th>Rank</th>
<th>Name</th>
<th>Score</th>
</tr>

{% for user in users %}

<tr>
<td>{{ loop.index }}</td>
<td>{{ user.name }}</td>
<td>{{ user.total_score }}</td>
</tr>

{% endfor %}

</table>

<style>

.leaderboard{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

.leaderboard th,
.leaderboard td{
padding:15px;
border-bottom:1px solid #374151;
text-align:left;
}

.leaderboard th{
color:#9ca3af;
}

</style>

{% endblock %}
