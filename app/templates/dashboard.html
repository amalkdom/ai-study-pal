{% extends "base.html" %}

{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="grid">

<div class="card">
<h3>Total Quizzes</h3>
<p class="metric">{{ total_quizzes }}</p>
</div>

<div class="card">
<h3>Average Score</h3>
<p class="metric">{{ average_score }}%</p>
</div>

<div class="card">
<h3>AI Confidence</h3>
<p class="metric">{{ predicted_score }}%</p>
</div>

<div class="card">
<h3>Learning Streak</h3>
<p class="metric">{{ streak_days }} days</p>
</div>

</div>

<div class="chart-card">
<h3>Performance Trend</h3>
<canvas id="trendChart"></canvas>
</div>

<script>

let scores = {{ scores|safe }};

new Chart(document.getElementById("trendChart"), {
type: "line",
data: {
labels: scores.map((_,i)=>"Quiz "+(i+1)),
datasets: [{
data: scores,
borderColor:"#3b82f6",
backgroundColor:"rgba(59,130,246,0.2)",
fill:true,
tension:0.4
}]
},
options:{
plugins:{legend:{display:false}},
scales:{y:{beginAtZero:true,max:100}}
}
});

</script>

<style>

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:40px;
}

.card{
background:#111827;
padding:25px;
border-radius:10px;
text-align:center;
}

.metric{
font-size:32px;
font-weight:bold;
margin-top:10px;
}

.chart-card{
background:#111827;
padding:30px;
border-radius:10px;
}

</style>

{% endblock %}
