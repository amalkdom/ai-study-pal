<!DOCTYPE html>
<html>
<head>

<title>Login | AI Study Pal</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:400px;
background:#020617;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.register{
text-align:center;
margin-top:15px;
}

a{
color:#60a5fa;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<form method="POST">

<input type="email" name="email" placeholder="Email Address" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="register">
Don't have an account?  
<a href="/register">Register</a>
</div>

</div>

</body>
</html>
