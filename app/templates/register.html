<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    width:420px;
    background:#111827;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:6px;
    border:none;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.login{
    text-align:center;
    margin-top:15px;
}

a{
    color:#60a5fa;
}

</style>
</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form method="POST">

<input type="text" name="name" placeholder="Full Name" required>

<input type="number" name="age" placeholder="Age" required>

<input type="text" name="class_level" placeholder="Class / UG / PG" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<div class="login">
Already have an account?  
<a href="/login">Login</a>
</div>

</div>

</body>
</html>
