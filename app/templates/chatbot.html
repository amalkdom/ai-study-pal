{% extends "base.html" %}

{% block content %}

<h2>AI Tutor</h2>

<form method="POST">

<input
type="text"
name="question"
placeholder="Ask AI anything about your topic"
style="width:100%;padding:12px"
>

<button type="submit">Ask AI</button>

</form>

{% if answer %}

<div style="margin-top:30px;background:#111827;padding:20px">

<p>{{ answer }}</p>

</div>

{% endif %}

{% endblock %}
