{% extends "base.html" %}

{% block content %}

<h2>Platform Analytics</h2>

<div class="grid">

<div class="card">
<h3>Total Users</h3>
<p>{{ total_users }}</p>
</div>

<div class="card">
<h3>Average Score</h3>
<p>{{ avg_score }}</p>
</div>

</div>

<style>

grid-template-columns:repeat(2,1fr);

}

.card{
background:#111827;
padding:30px;
border-radius:10px;
text-align:center;
}

</style>

{% endblock %}
