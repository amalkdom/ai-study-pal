<!DOCTYPE html>
<html>
<head>
<title>AI Study Pal</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.sidebar{
width:230px;
height:100vh;
position:fixed;
background:#020617;
padding-top:25px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:14px 20px;
color:#cbd5f5;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

.main{
margin-left:230px;
padding:40px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.badge{
background:#2563eb;
padding:6px 12px;
border-radius:20px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>AI Study Pal</h2>

<a href="{{ url_for('main.dashboard') }}">Dashboard</a>

<a href="{{ url_for('main.quiz') }}">Generate Quiz</a>

<a href="{{ url_for('main.planner') }}">Study Planner</a>

<a href="{{ url_for('main.performance') }}">Performance</a>

<a href="{{ url_for('main.chatbot') }}">AI Assistant</a>

<a href="{{ url_for('main.timeline') }}">Activity</a>

<a href="{{ url_for('main.leaderboard') }}">Leaderboard</a>

<a href="{{ url_for('auth.logout') }}">Logout</a>

</div>

<div class="main">

<div class="topbar">

<h2>Welcome back, {{ current_user.name }}</h2>

<div class="badge">
{{ current_user.role }}
</div>

</div>

{% block content %}
{% endblock %}

</div>

</body>
</html>
