<!DOCTYPE html>
<html>
<head>
<title>AI Study Pal</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
}

.sidebar{
width:240px;
background:#020617;
height:100vh;
padding:25px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:#cbd5f5;
text-decoration:none;
margin:15px 0;
font-size:16px;
}

.sidebar a:hover{
color:white;
}

.main{
flex:1;
padding:40px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.role{
background:#2563eb;
padding:6px 14px;
border-radius:20px;
font-size:12px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>AI Study Pal</h2>

<a href="{{ url_for('main.dashboard') }}">Dashboard</a>
<a href="{{ url_for('main.quiz') }}">Generate Quiz</a>
<a href="{{ url_for('main.planner') }}">Study Planner</a>
<a href="{{ url_for('main.performance') }}">Performance</a>
<a href="{{ url_for('main.chatbot') }}">AI Assistant</a>
<a href="{{ url_for('main.timeline') }}">Activity</a>
<a href="{{ url_for('auth.logout') }}">Logout</a>

</div>

<div class="main">

<div class="topbar">
<h2>Welcome back, {{ current_user.name }}</h2>
<div class="role">{{ current_user.role }}</div>
</div>

{% block content %}{% endblock %}

</div>

</body>
</html>
